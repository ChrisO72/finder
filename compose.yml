name: finder

networks:
  default:
    name: finder

volumes:
  pgdata:
  redisdata:

services:
  database:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: "finder"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finder-password}
      POSTGRES_USER: ${POSTGRES_USER:-finder-user}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:55432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
