name: finder-database

networks:
  default:
    name: finder

volumes:
  pgdata:

services:
  database:
    image: postgres:16.1-alpine3.19
    restart: always
    environment:
      POSTGRES_DB: "finder"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finder-password}
      POSTGRES_USER: ${POSTGRES_USER:-finder-user}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:55432:5432"
